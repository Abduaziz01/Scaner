<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #00ffe1;
    --accent2: #7f5af0;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #2cb67d;
    --danger: #ff6b6b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,225,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,225,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb.one { background: var(--accent); top: -150px; right: -100px; animation: drift1 12s ease-in-out infinite; }
  .glow-orb.two { background: var(--accent2); bottom: -150px; left: -100px; animation: drift2 15s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,40px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,-40px)} }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
    padding: 32px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Header */
  header {
    text-align: center;
    animation: fadeDown 0.6s ease both;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    border: 2px solid var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: pulse-border 2.5s ease-in-out infinite;
  }
  .logo-icon svg { width: 24px; height: 24px; fill: var(--accent); }
  @keyframes pulse-border {
    0%,100%{ box-shadow: 0 0 0 0 rgba(0,255,225,0.4); }
    50%{ box-shadow: 0 0 0 8px rgba(0,255,225,0); }
  }
  h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
    width: 100%;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab.active {
    background: linear-gradient(135deg, rgba(0,255,225,0.15), rgba(127,90,240,0.15));
    color: var(--accent);
    border: 1px solid rgba(0,255,225,0.2);
  }
  .tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }

  /* Panels */
  .panel { width: 100%; display: none; animation: fadeUp 0.35s ease both; }
  .panel.active { display: flex; flex-direction: column; gap: 20px; }

  /* Camera card */
  .camera-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }
  .video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #canvas { display: none; }

  /* Scan frame overlay */
  .scan-frame {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .frame-box {
    width: 55%; aspect-ratio: 1;
    position: relative;
  }
  .frame-box::before, .frame-box::after,
  .frame-box span::before, .frame-box span::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--accent);
    border-style: solid;
  }
  .frame-box::before { top:0; left:0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .frame-box::after  { top:0; right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .frame-box span::before { bottom:0; left:0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .frame-box span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  /* Laser scan line */
  .scan-line {
    position: absolute;
    left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 15%;
    animation: scan 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }
  @keyframes scan {
    0%,100%{ top: 15%; opacity: 0; }
    10%{ opacity: 1; }
    90%{ opacity: 1; }
    50%{ top: 80%; }
  }

  .camera-status {
    position: absolute;
    bottom: 12px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(0,0,0,0.6);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .idle-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    padding: 60px 20px;
  }
  .idle-placeholder svg { width: 64px; height: 64px; opacity: 0.3; }
  .idle-placeholder p { font-size: 0.9rem; text-align: center; }

  /* Buttons */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0a0f;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,255,225,0.25); }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(255,107,107,0.15); color: var(--danger); border: 1px solid rgba(255,107,107,0.3); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-row { display: flex; gap: 10px; }

  /* Upload area */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--accent);
    background: rgba(0,255,225,0.04);
  }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-area svg { width: 48px; height: 48px; color: var(--muted); transition: color 0.2s; }
  .upload-area:hover svg { color: var(--accent); }
  .upload-area p { color: var(--muted); font-size: 0.9rem; }
  .upload-area strong { color: var(--text); }

  /* Generate tab */
  .input-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  label { font-size: 0.82rem; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }
  textarea, input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.88rem;
    padding: 14px;
    width: 100%;
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus, input[type="text"]:focus { border-color: var(--accent); }
  textarea { min-height: 100px; }

  .size-select {
    display: flex; gap: 8px;
  }
  .size-opt {
    flex: 1;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .size-opt.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,225,0.08); }

  .qr-preview-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  #qrCanvas {
    border-radius: 12px;
    display: none;
    image-rendering: pixelated;
  }
  .qr-placeholder {
    width: 200px; height: 200px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
    padding: 20px;
  }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 14px;
    animation: fadeUp 0.3s ease both;
  }
  .result-card.visible { display: flex; border-color: var(--success); }
  .result-header {
    display: flex; align-items: center; gap: 10px;
  }
  .result-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(44,182,125,0.15);
    color: var(--success);
    border: 1px solid rgba(44,182,125,0.3);
  }
  .result-type { color: var(--muted); font-size: 0.8rem; font-family: 'Space Mono', monospace; }
  .result-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.88rem;
    word-break: break-all;
    line-height: 1.6;
    color: var(--text);
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 14px;
    border: 1px solid var(--border);
    max-height: 120px;
    overflow-y: auto;
  }

  /* History */
  .history-list {
    display: flex; flex-direction: column; gap: 10px;
  }
  .history-empty {
    text-align: center;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 40px 20px;
  }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .history-item:hover { border-color: var(--accent2); transform: translateX(3px); }
  .history-item-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, rgba(0,255,225,0.1), rgba(127,90,240,0.1));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
  }
  .history-item-text { flex: 1; min-width: 0; }
  .history-item-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .history-item-meta {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'Space Mono', monospace;
  }
  .history-item-copy {
    font-size: 1rem;
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px;
    transition: color 0.2s;
  }
  .history-item-copy:hover { color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 10px 20px;
    border-radius: 30px;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    box-shadow: 0 4px 24px rgba(0,255,225,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Animations */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 480px) {
    h1 { font-size: 1.6rem; }
    .wrapper { padding: 20px 14px 60px; }
  }
</style>
</head>
<body>

<div class="glow-orb one"></div>
<div class="glow-orb two"></div>

<div class="wrapper">

  <header>
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 3h7v7H3V3zm1 1v5h5V4H4zm1 1h3v3H5V5zM14 3h7v7h-7V3zm1 1v5h5V4h-5zm1 1h3v3h-3V5zM3 14h7v7H3v-7zm1 1v5h5v-5H4zm1 1h3v3H5v-3zM14 14h2v2h-2v-2zm3 0h2v2h-2v-2zm-3 3h2v2h-2v-2zm3 0h2v2h-2v-2zm-3 3h2v2h-2v-2zm3 0h2v2h-2v-2z"/>
        </svg>
      </div>
      <h1>QR Studio</h1>
    </div>
    <p class="subtitle">Scan · Upload · Generate</p>
  </header>

  <!-- Tabs -->
  <nav class="tabs">
    <button class="tab active" onclick="switchTab('scan')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M20 5h-6v6h6V5zm-6 8h1.5v1.5H14V13zm1.5 1.5H17V16h-1.5v-1.5zM17 13h1.5v1.5H17V13zm-3 3h1.5v1.5H14V16zm1.5 1.5H17V19h-1.5v-1.5zM17 16h1.5v1.5H17V16zm1.5-1.5H20V16h-1.5v-1.5zM20 13h1.5v1.5H20V13zm-1.5 3H20v1.5h-1.5V16zM20 17.5h1.5V19H20v-1.5zM22 13h-1.5v1.5H22V13z"/></svg>
      Camera
    </button>
    <button class="tab" onclick="switchTab('upload')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
      Upload
    </button>
    <button class="tab" onclick="switchTab('generate')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      Generate
    </button>
    <button class="tab" onclick="switchTab('history')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      History
    </button>
  </nav>

  <!-- CAMERA PANEL -->
  <div class="panel active" id="panel-scan">
    <div class="camera-card">
      <div class="video-wrapper" id="videoWrapper">
        <div class="idle-placeholder" id="idlePlaceholder">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M20 5h-6v6h6V5z"/></svg>
          <p>Press <strong>Start Scanner</strong> to activate your camera</p>
        </div>
        <video id="video" playsinline autoplay muted style="display:none"></video>
        <canvas id="canvas"></canvas>
        <div class="scan-frame" id="scanFrame" style="display:none">
          <div class="frame-box"><span></span></div>
          <div class="scan-line"></div>
        </div>
        <div class="camera-status" id="cameraStatus" style="display:none">● SCANNING</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn" onclick="startCamera()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        Start Scanner
      </button>
      <button class="btn btn-secondary" id="stopBtn" onclick="stopCamera()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
        Stop
      </button>
    </div>

    <div class="result-card" id="scanResult">
      <div class="result-header">
        <span class="result-badge">✓ Decoded</span>
        <span class="result-type" id="scanResultType">—</span>
      </div>
      <div class="result-text" id="scanResultText"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="copyResult('scanResultText')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          Copy
        </button>
        <button class="btn btn-secondary" id="openLinkBtn" onclick="openLink('scanResultText')" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
          Open URL
        </button>
      </div>
    </div>
  </div>

  <!-- UPLOAD PANEL -->
  <div class="panel" id="panel-upload">
    <div class="upload-area" id="uploadArea" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
      <input type="file" accept="image/*" onchange="handleFile(this.files[0])"/>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p><strong>Drop an image here</strong><br/>or click to browse</p>
      <p style="font-size:0.75rem; margin-top:-4px;">PNG, JPG, WEBP supported</p>
    </div>

    <div id="uploadPreview" style="display:none">
      <img id="uploadedImg" style="width:100%; border-radius:12px; border:1px solid var(--border); display:block;" alt="uploaded"/>
    </div>

    <div class="result-card" id="uploadResult">
      <div class="result-header">
        <span class="result-badge">✓ Decoded</span>
        <span class="result-type" id="uploadResultType">—</span>
      </div>
      <div class="result-text" id="uploadResultText"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="copyResult('uploadResultText')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          Copy
        </button>
        <button class="btn btn-secondary" id="openUploadLinkBtn" onclick="openLink('uploadResultText')" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
          Open URL
        </button>
      </div>
    </div>
  </div>

  <!-- GENERATE PANEL -->
  <div class="panel" id="panel-generate">
    <div class="input-group">
      <label>Content to encode</label>
      <textarea id="qrInput" placeholder="Enter URL, text, email, phone number..."></textarea>
    </div>

    <div class="input-group">
      <label>Size</label>
      <div class="size-select">
        <div class="size-opt active" onclick="setSize(200, this)">200px</div>
        <div class="size-opt" onclick="setSize(300, this)">300px</div>
        <div class="size-opt" onclick="setSize(400, this)">400px</div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateQR()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M20 5h-6v6h6V5z"/></svg>
      Generate QR Code
    </button>

    <div class="qr-preview-box">
      <div class="qr-placeholder" id="qrPlaceholder">
        <span>Your QR code<br/>will appear here</span>
      </div>
      <canvas id="qrCanvas"></canvas>
      <div class="btn-row" id="qrDownloadRow" style="display:none; width:100%">
        <button class="btn btn-secondary" onclick="downloadQR()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download PNG
        </button>
        <button class="btn btn-secondary" onclick="copyQRToClipboard()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          Copy Image
        </button>
      </div>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel" id="panel-history">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:0.8rem; color:var(--muted); font-family:'Space Mono',monospace;" id="historyCount">0 scans</span>
      <button class="btn btn-danger" style="width:auto; padding:8px 16px; font-size:0.8rem;" onclick="clearHistory()">Clear All</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No scan history yet.<br/>Start scanning to see results here.</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- QR Generator library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ─── State ────────────────────────────────────────────────
let stream = null;
let animFrame = null;
let qrSize = 200;
let history = JSON.parse(localStorage.getItem('qr_history') || '[]');

// ─── Tab switching ─────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['scan','upload','generate','history'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'history') renderHistory();
}

// ─── Camera Scanner ────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('idlePlaceholder').style.display = 'none';
    document.getElementById('scanFrame').style.display = 'flex';
    document.getElementById('cameraStatus').style.display = 'block';
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'flex';
    video.onloadedmetadata = () => { video.play(); scanFrame(); };
  } catch(e) {
    showToast('Camera access denied or unavailable');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  const video = document.getElementById('video');
  video.style.display = 'none';
  video.srcObject = null;
  document.getElementById('idlePlaceholder').style.display = 'flex';
  document.getElementById('scanFrame').style.display = 'none';
  document.getElementById('cameraStatus').style.display = 'none';
  document.getElementById('startBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display = 'none';
}

function scanFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
    if (code) {
      showScanResult(code.data);
      return;
    }
  }
  animFrame = requestAnimationFrame(scanFrame);
}

function showScanResult(data) {
  stopCamera();
  const resultCard = document.getElementById('scanResult');
  document.getElementById('scanResultText').textContent = data;
  document.getElementById('scanResultType').textContent = detectType(data);
  resultCard.classList.add('visible');
  const linkBtn = document.getElementById('openLinkBtn');
  linkBtn.style.display = isURL(data) ? 'flex' : 'none';
  addToHistory(data);
  showToast('✓ QR Code decoded!');
}

// ─── Upload Scanner ────────────────────────────────────────
function dragOver(e) { e.preventDefault(); document.getElementById('uploadArea').classList.add('drag-over'); }
function dragLeave()  { document.getElementById('uploadArea').classList.remove('drag-over'); }
function dropFile(e)  { e.preventDefault(); dragLeave(); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) { showToast('Please upload an image file'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });

      document.getElementById('uploadedImg').src = e.target.result;
      document.getElementById('uploadPreview').style.display = 'block';

      if (code) {
        document.getElementById('uploadResultText').textContent = code.data;
        document.getElementById('uploadResultType').textContent = detectType(code.data);
        document.getElementById('uploadResult').classList.add('visible');
        const linkBtn = document.getElementById('openUploadLinkBtn');
        linkBtn.style.display = isURL(code.data) ? 'flex' : 'none';
        addToHistory(code.data);
        showToast('✓ QR Code decoded!');
      } else {
        showToast('No QR code found in image');
        document.getElementById('uploadResult').classList.remove('visible');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── QR Generator ─────────────────────────────────────────
function setSize(size, el) {
  qrSize = size;
  document.querySelectorAll('.size-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
}

function generateQR() {
  const text = document.getElementById('qrInput').value.trim();
  if (!text) { showToast('Please enter some content'); return; }

  const placeholder = document.getElementById('qrPlaceholder');
  const canvas = document.getElementById('qrCanvas');
  placeholder.style.display = 'none';
  canvas.style.display = 'none';

  // Use QRCode library
  const tempDiv = document.createElement('div');
  try {
    new QRCode(tempDiv, {
      text: text,
      width: qrSize,
      height: qrSize,
      colorDark: '#e8e8f0',
      colorLight: '#13131a',
      correctLevel: QRCode.CorrectLevel.H
    });
    setTimeout(() => {
      const img = tempDiv.querySelector('img') || tempDiv.querySelector('canvas');
      if (!img) return;
      const src = img.tagName === 'IMG' ? img.src : img.toDataURL();
      const image = new Image();
      image.onload = () => {
        canvas.width = qrSize; canvas.height = qrSize;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(image, 0, 0, qrSize, qrSize);
        canvas.style.display = 'block';
        canvas.style.width = qrSize + 'px';
        canvas.style.height = qrSize + 'px';
        document.getElementById('qrDownloadRow').style.display = 'flex';
        showToast('✓ QR Code generated!');
      };
      image.src = src;
    }, 100);
  } catch(e) {
    showToast('Generation failed'); placeholder.style.display = 'flex';
  }
}

function downloadQR() {
  const canvas = document.getElementById('qrCanvas');
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL();
  link.click();
  showToast('Downloading...');
}

async function copyQRToClipboard() {
  try {
    const canvas = document.getElementById('qrCanvas');
    canvas.toBlob(async blob => {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      showToast('Image copied to clipboard!');
    });
  } catch { showToast('Copy not supported in this browser'); }
}

// ─── History ───────────────────────────────────────────────
function addToHistory(value) {
  history.unshift({ value, type: detectType(value), time: new Date().toISOString() });
  if (history.length > 50) history.pop();
  localStorage.setItem('qr_history', JSON.stringify(history));
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const count = document.getElementById('historyCount');
  count.textContent = history.length + ' scan' + (history.length !== 1 ? 's' : '');
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">No scan history yet.<br/>Start scanning to see results here.</div>';
    return;
  }
  list.innerHTML = history.map((item, i) => `
    <div class="history-item" onclick="copyText('${escHtml(item.value)}')">
      <div class="history-item-icon">${typeEmoji(item.type)}</div>
      <div class="history-item-text">
        <div class="history-item-value">${escHtml(item.value)}</div>
        <div class="history-item-meta">${item.type} · ${formatTime(item.time)}</div>
      </div>
      <button class="history-item-copy" title="Copy" onclick="event.stopPropagation();copyText('${escHtml(item.value)}')">⎘</button>
    </div>
  `).join('');
}

function clearHistory() {
  history = [];
  localStorage.setItem('qr_history', '[]');
  renderHistory();
  showToast('History cleared');
}

// ─── Utilities ────────────────────────────────────────────
function detectType(val) {
  if (/^https?:\/\//i.test(val)) return 'URL';
  if (/^mailto:/i.test(val)) return 'Email';
  if (/^tel:/i.test(val)) return 'Phone';
  if (/^WIFI:/i.test(val)) return 'WiFi';
  if (/^BEGIN:VCARD/i.test(val)) return 'Contact';
  if (/^geo:/i.test(val)) return 'Location';
  if (/^smsto:/i.test(val)) return 'SMS';
  return 'Text';
}

function typeEmoji(type) {
  const map = { URL:'🔗', Email:'📧', Phone:'📞', WiFi:'📶', Contact:'👤', Location:'📍', SMS:'💬', Text:'📝' };
  return map[type] || '📋';
}

function isURL(val) { return /^https?:\/\//i.test(val); }

function openLink(id) {
  const val = document.getElementById(id).textContent;
  if (isURL(val)) window.open(val, '_blank');
}

function copyResult(id) { copyText(document.getElementById(id).textContent); }

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!')).catch(() => showToast('Copy failed'));
}

function escHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
